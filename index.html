<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Lab</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs><g id="miaShape">
  <g class="armL"><line x1="42" y1="86" x2="26" y2="100" stroke="#EFCB4F" stroke-width="9" stroke-linecap="round"/></g>
  <path d="M34 92 Q28 60 32 40 Q38 14 60 14 Q82 14 88 40 Q92 60 86 92 Q82 98 78 94 L76 60 Q74 42 60 42 Q46 42 44 60 L42 94 Q38 98 34 92 Z" fill="#3A2B24"/>
  <path d="M32 130 Q30 82 60 78 Q90 82 88 130 Z" fill="#EFCB4F"/>
  <rect x="50" y="72" width="20" height="9" rx="4" fill="#e0ba3e"/>
  <path d="M46 100 Q60 106 74 100 M44 114 Q60 120 76 114" fill="none" stroke="#e0ba3e" stroke-width="2"/>
  <g><rect x="14" y="96" width="21" height="27" rx="2.5" fill="#6D55B8"/><rect x="14" y="96" width="4" height="27" rx="2" fill="#57448f"/><text x="19" y="116" font-size="15" fill="#fff" font-family="serif">&#119070;</text></g>
  <circle cx="60" cy="50" r="23" fill="#FFDCB8"/>
  <path d="M38 52 Q34 20 60 18 Q86 20 82 52 Q80 34 66 30 Q56 28 48 34 Q40 40 38 52 Z" fill="#3A2B24"/>
  <path class="browL" d="M44 38 Q50 35.5 55 38" fill="none" stroke="#4a382e" stroke-width="2.2" stroke-linecap="round"/>
  <path class="browR" d="M65 38 Q70 35.5 76 38" fill="none" stroke="#4a382e" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="51" cy="49" r="3" fill="#2B2B2B"/><circle cx="69" cy="49" r="3" fill="#2B2B2B"/>
  <circle cx="52.2" cy="47.9" r="1" fill="#fff"/><circle cx="70.2" cy="47.9" r="1" fill="#fff"/>
  <circle cx="51" cy="49" r="8.5" fill="none" stroke="#6b5340" stroke-width="2"/>
  <circle cx="69" cy="49" r="8.5" fill="none" stroke="#6b5340" stroke-width="2"/>
  <line x1="59.5" y1="49" x2="60.5" y2="49" stroke="#6b5340" stroke-width="2"/>
  <line x1="42.5" y1="48" x2="38" y2="46" stroke="#6b5340" stroke-width="2"/>
  <line x1="77.5" y1="48" x2="82" y2="46" stroke="#6b5340" stroke-width="2"/>
  <circle cx="45" cy="58" r="3" fill="#f6b8a0" opacity=".55"/><circle cx="75" cy="58" r="3" fill="#f6b8a0" opacity=".55"/>
  <path class="mouth-smile" d="M53 61 Q60 67 67 61" fill="none" stroke="#a3542f" stroke-width="2.6" stroke-linecap="round"/>
  <g class="armR"><line x1="78" y1="86" x2="97" y2="98" stroke="#EFCB4F" stroke-width="9" stroke-linecap="round"/><circle cx="99" cy="99" r="4.5" fill="#FFDCB8"/></g>
</g></defs></svg>
<header class="pl-header">
  <div class="inner">
    <h1 id="appName"></h1>
    <span class="sub" data-i18n="app.subtitle"></span>
    <span class="midi-chip" id="midiChip" data-i18n="midi.init"></span>
  </div>
</header>
<main class="pl-main">
  <section class="lesson-head card">
    <div class="crumb" id="lessonCrumb"></div>
    <h2 id="lessonTitle"></h2>
    <p class="goal" id="lessonGoal"></p>
    <p class="desc" id="lessonDesc"></p>
    <div class="mia-strip mia-strip-sm">
      <svg class="mia-avatar" viewBox="10 8 100 126" aria-hidden="true"><use href="#miaShape"/></svg>
      <div class="mia-bubble" id="formulaChip"></div>
    </div>
  </section>
  <section class="pl-controls card">
    <div class="ctl-row">
      <label><span data-i18n="ui.lesson"></span><select id="selLesson"></select></label>
      <label id="exWrap"><span data-i18n="ui.exercise"></span><select id="selEx"></select></label>
      <label><span data-i18n="ui.key"></span><select id="selKey"></select></label>
      <div class="seg" id="segHand" role="group" aria-label="Hands"></div>
      <div class="seg" id="segMode" role="group" aria-label="Mode"></div>
    </div>
    <div class="ctl-row">
      <label class="tempo"><span data-i18n="ui.tempo"></span>
        <input type="range" id="tempo" min="40" max="144" step="4" value="72">
        <b>♩=<span id="tempoVal">72</span></b></label>
      <label class="chk"><input type="checkbox" id="chkLoop"><span data-i18n="ui.loop"></span></label>
      <label class="chk"><input type="checkbox" id="chkMet"><span data-i18n="ui.metronome"></span></label>
      <label class="chk"><input type="checkbox" id="chkSound" checked><span data-i18n="ui.sound"></span></label>
      <label class="chk"><input type="checkbox" id="chkFing" checked><span data-i18n="ui.fingering"></span></label>
      <label class="chk"><input type="checkbox" id="chkFall" checked><span data-i18n="ui.fall"></span></label>
      <label class="tempo" id="tolWrap"><span data-i18n="ui.tolerance"></span>
        <input type="range" id="tol" min="80" max="400" step="20" value="180">
        <b><span id="tolVal">180</span> ms</b></label>
    </div>
    <div class="ctl-row transport">
      <button id="btnRestart" data-i18n-title="ui.restart">⏮</button>
      <button id="btnPlay" class="big" data-i18n-title="ui.play">▶</button>
      <button id="btnStop" data-i18n-title="ui.stop">⏹</button>
      <button id="btnPrev" data-i18n-title="ui.prev">◀</button>
      <button id="btnNext" data-i18n-title="ui.next">▶|</button>
      <button id="btnStart" class="big start" data-i18n="ui.start"></button>
    </div>
  </section>

  <h2 id="exTitle" class="ex-title"></h2>
  <section id="score" class="score-wrap card" aria-label="Musical score"></section>
  <div class="mia-strip">
    <svg class="mia-avatar" viewBox="10 8 100 126" aria-hidden="true"><use href="#miaShape"/></svg>
    <div class="mia-bubble" id="fbText" aria-live="polite"></div>
  </div>
  <section id="kbd" class="kbd-wrap" aria-label="Piano keyboard"></section>

  <section class="card prog-card">
    <h3 data-i18n="prog.title"></h3>
    <div id="progList"></div>
  </section>

  <details class="pl-setup card" id="teacherPanel">
    <summary data-i18n="teacher.title"></summary>
    <p data-i18n="teacher.keys"></p>
    <div id="teacherKeys" class="tkeys"></div>
    <p style="margin-top:14px"><label class="chk"><input type="checkbox" id="chkFingEdit"><span data-i18n="ui.fingerEdit"></span></label></p>
  </details>

  <details class="pl-setup card">
    <summary data-i18n="setup.title"></summary>
    <p class="local-note" data-i18n="setup.local"></p>
    <p data-i18n="setup.p1"></p>
    <p data-i18n="setup.p2"></p>
    <p data-i18n="setup.p3"></p>
    <p data-i18n="setup.p4"></p>
  </details>
</main>
<script src="js/config.js"></script>
<script src="locales/en.js"></script>
<script src="js/i18n.js"></script>
<script src="js/pitch.js"></script>
<script src="js/exercises.js"></script>
<script src="js/lessons.js"></script>
<script src="js/notation.js"></script>
<script src="js/piano.js"></script>
<script src="js/fall.js"></script>
<script src="js/audio.js"></script>
<script src="js/midi.js"></script>
<script src="js/player.js"></script>
<script src="js/practice.js"></script>
<script src="js/progress.js"></script>
<script src="js/app.js"></script>
</body>
</html>
